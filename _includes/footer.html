<footer class="site-footer">
  <div class="site-wrapper">
    <div class="footer-inner">
      <span>{{ site.title }}</span>
      {%- if site.github_username -%}
      <span><a href="https://github.com/{{ site.github_username }}">github/{{ site.github_username }}</a></span>
      {%- endif -%}
      <span><a href="https://github.com/{{ site.github_username }}/{{ site.github_username }}.github.io/commits/main/{{ page.path }}">edit history</a></span>
    </div>
  </div>
</footer>
